# Unit tests (JVM) + instrumented UI tests (emulator).
name: Android Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: android-tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode google-services.json from secret (optional)
        env:
          DATA: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$DATA" ]; then
            echo "$DATA" | base64 --decode > app/google-services.json
          fi

      - name: Run JVM unit tests
        run: ./gradlew :chesscore:test :app:testDebugUnitTest --no-daemon --stacktrace

      - name: Upload unit test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            app/build/reports/tests/
            chesscore/build/reports/tests/
          if-no-files-found: ignore

  instrumented-tests:
    name: Instrumented (UI) tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode google-services.json from secret (optional)
        env:
          DATA: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$DATA" ]; then
            echo "$DATA" | base64 --decode > app/google-services.json
          fi

      # Skip PgnGenerationBenchmarkInstrumentedTest: full GIF generation is too slow for PR CI.
      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          disable-animations: true
          disk-size: 6000M
          heap-size: 512M
          script: |
            ./gradlew :app:connectedDebugAndroidTest --no-daemon --stacktrace \
              -Pandroid.testInstrumentationRunnerArguments.notPackage=com.example.pgntogifconverter.benchmark

      - name: Upload instrumented test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-reports
          path: |
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/
          if-no-files-found: ignore
