# Manual release: minor version + versionCode bump, signed AAB, Play alpha + mapping.
#
# Required repo secrets:
#   RELEASE_KEYSTORE_BASE64, RELEASE_KEYSTORE_PASSWORD, RELEASE_KEY_ALIAS, RELEASE_KEY_PASSWORD
#   PLAY_SERVICE_ACCOUNT_JSON (plain JSON)
#   GOOGLE_SERVICES_JSON (base64, optional — same as android.yml)
#
# Tag each shipped release as v* (e.g. v1.3.1) so the next run can build "what's new" from git log.

name: Release to Play (alpha)

on:
  workflow_dispatch:
    inputs:
      release_notes_override:
        description: "Optional. Replaces auto-generated en-US release notes (max 500 chars used)."
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode google-services.json from secret (optional)
        env:
          DATA: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$DATA" ]; then
            echo "$DATA" | base64 --decode > app/google-services.json
          fi

      - name: Decode release keystore
        env:
          DATA: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$DATA" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Bump minor version, generate release notes
        id: release_prep
        env:
          INPUT_OVERRIDE: ${{ inputs.release_notes_override }}
        run: |
          set -euo pipefail
          FILE=app/build.gradle.kts
          VN=$(grep -E 'versionName' "$FILE" | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          VC=$(grep -E 'versionCode' "$FILE" | head -1 | sed -E 's/.*versionCode = ([0-9]+).*/\1/')
          IFS='.' read -r MA MI _patch <<< "$VN"
          NEW_MI=$((10#$MI + 1))
          NEW_VN="${MA}.${NEW_MI}.0"
          NEW_VC=$((VC + 1))
          export NEW_VN NEW_VC
          mkdir -p distribution/whatsnew
          python3 << 'PY'
          import os
          import re
          import subprocess
          from pathlib import Path

          new_vn = os.environ["NEW_VN"]
          new_vc = os.environ["NEW_VC"]
          path = "app/build.gradle.kts"
          text = open(path).read()
          text = re.sub(r"versionCode = \d+", f"versionCode = {new_vc}", text, count=1)
          text = re.sub(r'versionName = "[^"]*"', f'versionName = "{new_vn}"', text, count=1)
          open(path, "w").write(text)

          override = os.environ.get("INPUT_OVERRIDE", "").strip()
          Path("distribution/whatsnew").mkdir(parents=True, exist_ok=True)
          if override:
              Path("distribution/whatsnew/whatsnew-en-US").write_text(override[:500])
          else:
              tags = subprocess.run(
                  ["git", "tag", "-l", "v*", "--sort=-v:refname"],
                  capture_output=True,
                  text=True,
                  check=True,
              ).stdout.strip()
              first_tag = tags.split("\n")[0] if tags else ""
              if first_tag:
                  proc = subprocess.run(
                      ["git", "log", f"{first_tag}..HEAD", "--no-merges", "--pretty=format:- %s"],
                      capture_output=True,
                      text=True,
                      check=False,
                  )
              else:
                  proc = subprocess.run(
                      ["git", "log", "-30", "--no-merges", "--pretty=format:- %s"],
                      capture_output=True,
                      text=True,
                      check=False,
                  )
              notes = proc.stdout.strip()
              if not notes:
                  notes = f"- Version {new_vn}"
              if len(notes) > 500:
                  notes = notes[:497] + "..."
              Path("distribution/whatsnew/whatsnew-en-US").write_text(notes)
          PY
          {
            echo "new_version=$NEW_VN"
            echo "new_version_code=$NEW_VC"
          } >> "$GITHUB_OUTPUT"

      - name: Build release app bundle
        env:
          RELEASE_KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload to Play (alpha) with mapping
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.chunkymonkey.imagetogifconverter
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          tracks: alpha
          releaseName: v${{ steps.release_prep.outputs.new_version }}
          whatsNewDirectory: distribution/whatsnew
          mappingFile: app/build/outputs/mapping/release/mapping.txt
          status: completed

      - name: Commit version bump and push tag
        env:
          NEW_VERSION: ${{ steps.release_prep.outputs.new_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git commit -m "chore: bump version to ${NEW_VERSION}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git tag -a "v${NEW_VERSION}" -m "Release v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"
