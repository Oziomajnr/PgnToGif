name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode google-services.json from secret (optional)
        env:
          DATA: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$DATA" ]; then
            echo "$DATA" | base64 --decode > app/google-services.json
          fi

      - name: Build with Gradle
        run: ./gradlew build --no-daemon
